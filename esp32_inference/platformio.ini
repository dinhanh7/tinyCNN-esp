; PlatformIO Configuration for TinyMobileNet ESP32 Inference
;
; Build & Upload:  pio run --target upload
; Serial Monitor:  pio device monitor
; Clean:           pio run --target clean

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -O2
    -w
